# This workflow will Deploy a .NET project that has been built and track the latest build's via artifacts

name: Deploy

on:
  # scheduled to execute every Monday - Thursday at 11:59 pm CDT ( translated into UTC )
  schedule: 
    # see schedule docs: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#onschedule
    # see cron syntax: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/crontab.html#tag_20_25_07
    # see CDT to UTC conversion: https://savvytime.com/converter/cdt-to-utc
    - cron: '59 4 * * 2-5'

  # Can be manually triggered from the GitHub actions page: https://github.com/SensitTechnologies/MESS/actions/workflows/deploy.yml
  workflow_dispatch:

env:
  BUILD_COMMIT: 'last-build-version'
  LAST_DEPLOY_COMMIT: 'last-deploy-version'
  APP_ARTIFACT: .net-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    outputs:
      should-deploy: ${{ steps.compare.outputs.deploy }}

    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      # 1. Checkout with tags
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Fetch tags
      - name: Fetch tags
        run: git fetch --tags

      - name: Fetch main branch
        run: git fetch origin main

      # 3. Get latest commit
      - name: Get latest commit
        id: latest
        run: echo "sha=$(git rev-parse origin/main)" >> $GITHUB_OUTPUT

      # 4. Get deployed commit
      - name: Get deployed commit
        id: deployed
        run: |
          if git rev-parse deployed-prod >/dev/null 2>&1; then
            echo "sha=$(git rev-parse deployed-prod)" >> $GITHUB_OUTPUT
          else
            echo "sha=" >> $GITHUB_OUTPUT
            echo "No deployed tag found"
          fi

      # 5. Compare
      - name: Compare commits
        id: compare
        run: |
          DEPLOYED="${{ steps.deployed.outputs.sha }}"
          LATEST="${{ steps.latest.outputs.sha }}"

          if [ -z "$DEPLOYED" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "First deployment"
            exit 0
          fi

          if [ "$LATEST" = "$DEPLOYED" ]; then
            echo "deploy=false" >> $GITHUB_OUTPUT
          else
            echo "deploy=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Set GH CLI auth
        run: echo "${{ github.token }}" | gh auth login --with-token
        
      - name: Get Build run ID
        id: build-run
        if: steps.compare.outputs.deploy == 'true'
        run: |
          RUN_ID=$(gh run list --workflow Build --json databaseId --jq '.[0].databaseId')
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      # 6. Download artifact
      - name: Download artifact
        if: steps.compare.outputs.deploy == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_ARTIFACT }}
          run-id: ${{ steps.build-run.outputs.run-id }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}

      # 7. Deploy to Azure
      - name: Deploy to Azure Web App
        if: steps.compare.outputs.deploy == 'true'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sensit-mess'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}

      # 8. Update tag
      - name: Update deployed tag
        if: steps.compare.outputs.deploy == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f deployed-prod ${{ steps.latest.outputs.sha }}
          git push origin deployed-prod --force

  Call-Documentation:
    needs:
      - deploy
    if: needs.deploy.outputs.should-deploy == 'true'
    uses: ./.github/workflows/deploy_documentation.yml
